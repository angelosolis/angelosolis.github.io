<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f59e0b">
    <meta name="description" content="A simple stopwatch that ticks visually in 2-second steps while keeping accurate time underneath.">
    <title>2-Second Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #f97316;
            --orange-deep: #ea580c;
            --yellow: #facc15;
            --yellow-soft: #fde68a;
            --ink: #4a2e09;
            --surface: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #fff7ed 0%, #fde68a 45%, #fdba74 100%);
            color: var(--ink);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* respect notches / safe areas on mobile */
            padding: calc(1.25rem + env(safe-area-inset-top)) 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 700;
            color: var(--orange-deep);
            letter-spacing: -0.5px;
        }

        header p {
            margin-top: 0.4rem;
            font-size: clamp(0.85rem, 3.5vw, 0.95rem);
            font-weight: 400;
            color: #92400e;
            opacity: 0.9;
        }

        .timer-card {
            margin-top: 1.75rem;
            background: var(--surface);
            border: 2px solid rgba(249, 115, 22, 0.25);
            border-radius: 28px;
            padding: 2rem 1.25rem 1.75rem;
            box-shadow: 0 18px 40px -18px rgba(234, 88, 12, 0.55);
            backdrop-filter: blur(6px);
        }

        /* Big, visual display that jumps in 2-second increments */
        .display {
            font-variant-numeric: tabular-nums;
            font-size: clamp(3.25rem, 18vw, 5rem);
            font-weight: 700;
            line-height: 1;
            color: var(--orange-deep);
            text-shadow: 0 3px 0 rgba(250, 204, 21, 0.5);
        }

        .display.tick {
            animation: pop 0.28s ease;
        }

        @keyframes pop {
            0%   { transform: scale(1); }
            45%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* Smaller accurate readout that updates every second */
        .accurate {
            margin-top: 0.85rem;
            font-size: clamp(0.85rem, 4vw, 1rem);
            font-weight: 500;
            color: #b45309;
        }

        .accurate .value {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--orange-deep);
        }

        .controls {
            margin-top: 1.75rem;
            display: flex;
            gap: 0.75rem;
        }

        button {
            flex: 1;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 0.95rem 0.5rem;
            cursor: pointer;
            /* comfortable touch target on mobile */
            min-height: 56px;
            transition: transform 0.1s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        button:active {
            transform: translateY(2px);
        }

        button:focus-visible {
            outline: 3px solid var(--ink);
            outline-offset: 3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 100%);
            box-shadow: 0 10px 20px -8px rgba(234, 88, 12, 0.8);
        }

        .btn-reset {
            background: linear-gradient(135deg, var(--yellow) 0%, #f59e0b 100%);
            color: var(--ink);
            box-shadow: 0 10px 20px -8px rgba(245, 158, 11, 0.7);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }

        footer {
            margin-top: 1.5rem;
            font-size: 0.78rem;
            color: #b45309;
            opacity: 0.85;
        }

        @media (prefers-reduced-motion: reduce) {
            .display.tick { animation: none; }
            button { transition: none; }
        }
    </style>
</head>
<body>
    <main class="app">
        <header>
            <h1>2-Second Timer</h1>
            <p>The big number ticks up in 2-second steps (actual time &times; 2) &mdash; the real time keeps counting every second underneath.</p>
        </header>

        <section class="timer-card" aria-label="Stopwatch">
            <!-- Visual display: announces only the 2-second steps -->
            <div id="display" class="display" role="timer" aria-live="polite" aria-atomic="true">00:00</div>

            <!-- Accurate readout: updates every second, not announced repeatedly -->
            <p class="accurate" aria-live="off">
                Actual time: <span id="accurate" class="value">0.0s</span>
            </p>

            <div class="controls">
                <button id="toggle" class="btn-primary" type="button" aria-label="Start timer">Start</button>
                <button id="reset" class="btn-reset" type="button" aria-label="Reset timer" disabled>Reset</button>
            </div>
        </section>

        <footer>Mobile-first &middot; orange &amp; yellow</footer>
    </main>

    <script>
        (function () {
            'use strict';

            var displayEl  = document.getElementById('display');
            var accurateEl = document.getElementById('accurate');
            var toggleBtn  = document.getElementById('toggle');
            var resetBtn   = document.getElementById('reset');

            var running = false;
            var startTime = 0;          // timestamp when the current run started
            var accumulated = 0;        // ms accrued from previous runs (across pauses)
            var rafId = null;
            var tickInterval = null;
            var lastVisualStep = 0;     // last whole 2-second value we displayed

            // Total accurate elapsed milliseconds, regardless of pause state.
            function elapsedMs() {
                return accumulated + (running ? (performance.now() - startTime) : 0);
            }

            function pad(n) {
                return n < 10 ? '0' + n : '' + n;
            }

            function formatClock(totalSeconds) {
                var mins = Math.floor(totalSeconds / 60);
                var secs = totalSeconds % 60;
                return pad(mins) + ':' + pad(secs);
            }

            // Big display: shows DOUBLE the actual elapsed seconds, so every real
            // second it jumps by 2 (actual 2s -> visual 4s). The underlying time
            // stays accurate; only the displayed value is doubled.
            function renderVisual() {
                var actualSeconds = Math.floor(elapsedMs() / 1000);
                var step = actualSeconds * 2; // 2-second increments per real second
                if (step !== lastVisualStep) {
                    lastVisualStep = step;
                    displayEl.textContent = formatClock(step);
                    displayEl.classList.remove('tick');
                    // reflow so the animation can replay
                    void displayEl.offsetWidth;
                    displayEl.classList.add('tick');
                }
                if (running) {
                    rafId = requestAnimationFrame(renderVisual);
                }
            }

            // Accurate readout: refreshed every second, shows true elapsed time.
            function renderAccurate() {
                accurateEl.textContent = (elapsedMs() / 1000).toFixed(1) + 's';
            }

            function start() {
                running = true;
                startTime = performance.now();
                toggleBtn.textContent = 'Pause';
                toggleBtn.setAttribute('aria-label', 'Pause timer');
                resetBtn.disabled = false;
                renderAccurate();
                renderVisual();
                // tick the accurate readout on a true 1-second cadence
                tickInterval = setInterval(renderAccurate, 1000);
            }

            function pause() {
                running = false;
                accumulated = elapsedMs();
                toggleBtn.textContent = 'Resume';
                toggleBtn.setAttribute('aria-label', 'Resume timer');
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
                renderAccurate(); // make sure paused value is exact
            }

            function reset() {
                running = false;
                accumulated = 0;
                startTime = 0;
                lastVisualStep = 0;
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
                displayEl.textContent = '00:00';
                accurateEl.textContent = '0.0s';
                toggleBtn.textContent = 'Start';
                toggleBtn.setAttribute('aria-label', 'Start timer');
                resetBtn.disabled = true;
            }

            toggleBtn.addEventListener('click', function () {
                running ? pause() : start();
            });

            resetBtn.addEventListener('click', reset);

            // Keep things consistent if the tab is backgrounded then refocused:
            // rAF pauses in the background, so re-sync the display on return.
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden && running) {
                    renderAccurate();
                    if (!rafId) { rafId = requestAnimationFrame(renderVisual); }
                }
            });
        })();
    </script>
</body>
</html>
